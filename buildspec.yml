version: 0.2

phases:
  install:
    commands:
      - echo "Installing Flutter"
      - curl -o flutter.tar.xz https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.32.0-stable.tar.xz
      - tar xf flutter.tar.xz
      - git config --global --add safe.directory `pwd`/flutter
      - export PATH="$PATH:`pwd`/flutter/bin"
      - flutter doctor

  pre_build:
    commands:
      - export PATH="$PATH:`pwd`/flutter/bin"
      - flutter pub get

  build:
    commands:
      - export PATH="$PATH:`pwd`/flutter/bin"
      - flutter build web --release

  post_build:
    commands:
      - aws s3 sync build/web/ s3://formulario-ottokare --delete
      - aws cloudfront create-invalidation --distribution-id E1H9U8R6KWZAMH --paths "/*"

artifacts:
  files:
    - '**/*'